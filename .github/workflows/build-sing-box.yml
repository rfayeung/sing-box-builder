name: Build sing-box IPK for GL-AXT1800

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'sing-box 版本 (如 v1.14.0-alpha.26, 留空自动获取最新)'
        required: false
        default: ''
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 确定版本号
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
              | grep '"tag_name"' | cut -d'"' -f4)
          fi
          echo "version=${V#v}" >> $GITHUB_OUTPUT
          echo "tag=$V" >> $GITHUB_OUTPUT
          echo "确定版本: $V"

      - name: 检出 sing-box 源码
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ steps.version.outputs.tag }}
          fetch-depth: 1

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: 交叉编译 (linux/arm64, CGO_ENABLED=0)
        run: |
          mkdir -p build
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build \
            -ldflags="-s -w -X github.com/sagernet/sing-box/constant.Version=${{ steps.version.outputs.version }}" \
            -tags "with_quic,with_wireguard,with_utls,with_clash_api,with_gvisor,with_dhcp,with_tailscale" \
            -o build/sing-box \
            ./cmd/sing-box
          file build/sing-box
          ls -lh build/sing-box

      - name: 准备 OpenWrt 配置文件和默认配置
        run: |
          mkdir -p /tmp/sing-box-files
          wget -q https://raw.githubusercontent.com/openwrt/packages/master/net/sing-box/files/sing-box.conf -O /tmp/sing-box-files/sing-box.conf
          wget -q https://raw.githubusercontent.com/openwrt/packages/master/net/sing-box/files/sing-box.init -O /tmp/sing-box-files/sing-box.init
          chmod +x /tmp/sing-box-files/sing-box.init
          if [ -f release/config/config.json ]; then
            cp release/config/config.json /tmp/sing-box-files/config.json
          else
            printf '{\n  "log": { "level": "info" },\n  "inbounds": [],\n  "outbounds": []\n}\n' > /tmp/sing-box-files/config.json
          fi
          ls -la /tmp/sing-box-files

      - name: 打包为 IPK
        id: package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAG=${{ steps.version.outputs.tag }}
          PKG_NAME=sing-box
          PKG_ARCH=aarch64_cortex-a53
          PKG_FILE=${PKG_NAME}_${VERSION}_${PKG_ARCH}.ipk

          # 清理并创建目录
          PKG_DIR=ipk-build
          rm -rf $PKG_DIR
          mkdir -p $PKG_DIR/data/usr/bin
          mkdir -p $PKG_DIR/data/etc/sing-box
          mkdir -p $PKG_DIR/data/etc/config
          mkdir -p $PKG_DIR/data/etc/init.d
          mkdir -p $PKG_DIR/control

          # 复制文件到 data 目录
          cp build/sing-box $PKG_DIR/data/usr/bin/
          cp /tmp/sing-box-files/config.json $PKG_DIR/data/etc/sing-box/
          cp /tmp/sing-box-files/sing-box.conf $PKG_DIR/data/etc/config/
          cp /tmp/sing-box-files/sing-box.init $PKG_DIR/data/etc/init.d/sing-box

          # control 文件
          printf '%s\n' \
            "Package: $PKG_NAME" \
            "Version: $VERSION" \
            "Depends: ca-bundle, kmod-inet-diag, kmod-tun" \
            "Source: https://github.com/SagerNet/sing-box/tree/$TAG" \
            "License: GPL-3.0-or-later" \
            "Architecture: $PKG_ARCH" \
            "Description: The universal proxy platform" \
            > $PKG_DIR/control/control

          # 创建 ipk (ar archive)
          mkdir -p $PKG_DIR/pkg
          (cd $PKG_DIR/data && tar czf ../pkg/data.tar.gz .)
          (cd $PKG_DIR/control && tar czf ../pkg/control.tar.gz .)
          echo "2.0" > $PKG_DIR/pkg/debian-binary
          cd $PKG_DIR/pkg
          ar rc $GITHUB_WORKSPACE/$PKG_FILE debian-binary control.tar.gz data.tar.gz
          cd $GITHUB_WORKSPACE

          echo "pkg_file=$PKG_FILE" >> $GITHUB_OUTPUT
          echo "=== IPK 包内容 ==="
          ar t $PKG_FILE
          ls -lh $PKG_FILE

      - name: 上传 IPK 到 Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.pkg_file }}
          path: ${{ steps.package.outputs.pkg_file }}
          if-no-files-found: error
