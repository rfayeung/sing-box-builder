name: Build sing-box IPK for GL-AXT1800

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'sing-box 版本 (如 v1.14.0-alpha.26, 留空自动获取最新)'
        required: false
        default: ''
  schedule:
    - cron: '0 0 * * 0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 确定版本号
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
              | grep '"tag_name"' | cut -d'"' -f4)
          fi
          echo "version=${V#v}" >> $GITHUB_OUTPUT
          echo "tag=$V" >> $GITHUB_OUTPUT
          echo "确定版本: $V"

      - name: 检出 sing-box 源码
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ steps.version.outputs.tag }}
          fetch-depth: 1

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: 交叉编译 (linux/arm64, CGO_ENABLED=0)
        run: |
          mkdir -p build
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build \
            -ldflags="-s -w -X github.com/sagernet/sing-box/constant.Version=${{ steps.version.outputs.version }}" \
            -tags "with_quic,with_wireguard,with_utls,with_clash_api,with_gvisor,with_dhcp,with_tailscale" \
            -o build/sing-box \
            ./cmd/sing-box
          file build/sing-box
          ls -lh build/sing-box

      - name: 准备 OpenWrt 配置文件和默认配置
        run: |
          mkdir -p /tmp/sing-box-files
          wget -q https://raw.githubusercontent.com/openwrt/packages/master/net/sing-box/files/sing-box.conf -O /tmp/sing-box-files/sing-box.conf
          wget -q https://raw.githubusercontent.com/openwrt/packages/master/net/sing-box/files/sing-box.init -O /tmp/sing-box-files/sing-box.init
          chmod +x /tmp/sing-box-files/sing-box.init
          if [ -f release/config/config.json ]; then
            cp release/config/config.json /tmp/sing-box-files/config.json
          else
            printf '{\n  "log": { "level": "info" },\n  "inbounds": [],\n  "outbounds": []\n}\n' > /tmp/sing-box-files/config.json
          fi
          ls -la /tmp/sing-box-files

      - name: 打包为 IPK
        id: package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAG=${{ steps.version.outputs.tag }}
          PKG_NAME=sing-box
          PKG_ARCH=aarch64_cortex-a53
          PKG_FILE=${PKG_NAME}_${VERSION}_${PKG_ARCH}.ipk

          # 准备文件
          PKG_DIR=ipk-build
          rm -rf $PKG_DIR
          mkdir -p $PKG_DIR/control
          mkdir -p $PKG_DIR/data/usr/bin
          mkdir -p $PKG_DIR/data/etc/sing-box
          mkdir -p $PKG_DIR/data/etc/config
          mkdir -p $PKG_DIR/data/etc/init.d
          cp build/sing-box $PKG_DIR/data/usr/bin/
          cp /tmp/sing-box-files/config.json $PKG_DIR/data/etc/sing-box/
          cp /tmp/sing-box-files/sing-box.conf $PKG_DIR/data/etc/config/
          cp /tmp/sing-box-files/sing-box.init $PKG_DIR/data/etc/init.d/sing-box

          # control 文件
          printf '%s\n' \
            "Package: $PKG_NAME" \
            "Version: $VERSION" \
            "Depends: ca-bundle, kmod-inet-diag, kmod-tun" \
            "Source: https://github.com/SagerNet/sing-box/tree/$TAG" \
            "License: GPL-3.0-or-later" \
            "Architecture: $PKG_ARCH" \
            "Description: The universal proxy platform" \
            > $PKG_DIR/control/control

          # 写 Python 打包脚本到临时文件并执行
          export PKG_FILE PKG_DIR
          printf '%s\n' \
            'import os, tarfile, io, struct, time' \
            'pkg_dir = os.environ["PKG_DIR"]' \
            'pkg_file = os.environ["PKG_FILE"]' \
            'data_buf = io.BytesIO()' \
            'with tarfile.open(fileobj=data_buf, mode="w:gz") as tar:' \
            '    root = os.path.join(pkg_dir, "data")' \
            '    for dirpath, dirnames, filenames in os.walk(root):' \
            '        for fn in filenames:' \
            '            full = os.path.join(dirpath, fn)' \
            '            arcname = os.path.relpath(full, root)' \
            '            tar.add(full, arcname=arcname)' \
            'data_tar = data_buf.getvalue()' \
            'ctl_buf = io.BytesIO()' \
            'with tarfile.open(fileobj=ctl_buf, mode="w:gz") as tar:' \
            '    tar.add(os.path.join(pkg_dir, "control", "control"), arcname="control")' \
            'ctl_tar = ctl_buf.getvalue()' \
            'deb = b"2.0\n"' \
            'def ar_header(name, size):' \
            '    return struct.pack("=16s12s6s6s8s10s2s",' \
            '        name.encode("ascii").ljust(16)[:16],' \
            '        str(int(time.time())).encode().ljust(12)[:12],' \
            '        b"0".ljust(6), b"0".ljust(6),' \
            '        b"100644".ljust(8)[:8],' \
            '        str(size).encode().ljust(10)[:10], b"\x60\x0a")' \
            'with open(pkg_file, "wb") as f:' \
            '    f.write(b"!<arch>\n")' \
            '    for name, data in [("debian-binary", deb), ("control.tar.gz", ctl_tar), ("data.tar.gz", data_tar)]:' \
            '        f.write(ar_header(name, len(data)))' \
            '        f.write(data)' \
            '        if len(data) % 2 != 0:' \
            '            f.write(b"\n")' \
            'print("IPK created")' \
            > /tmp/build_ipk.py
          python3 /tmp/build_ipk.py

          # 验证 IPK 结构
          printf '%s\n' \
            'import os, struct' \
            'pkg_file = os.environ["PKG_FILE"]' \
            'with open(pkg_file, "rb") as f:' \
            '    m = f.read(8)' \
            '    print("Magic:", repr(m))' \
            '    for i in range(3):' \
            '        h = f.read(60)' \
            '        if len(h) < 60: break' \
            '        n = h[0:16].decode("ascii").strip()' \
            '        s = int(h[48:58].decode("ascii").strip())' \
            '        print(f"  [{i}] name={n} size={s}")' \
            '        f.seek(s + (s % 2), 1)' \
            'print("Validation OK")' \
            > /tmp/verify_ipk.py
          python3 /tmp/verify_ipk.py

          echo "pkg_file=$PKG_FILE" >> $GITHUB_OUTPUT
          ls -lh $PKG_FILE

      - name: 上传 IPK 到 Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.pkg_file }}
          path: ${{ steps.package.outputs.pkg_file }}
          if-no-files-found: error
